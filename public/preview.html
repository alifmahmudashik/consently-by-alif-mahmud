<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consent banner preview</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: repeating-conic-gradient(#f4f4f5 0% 25%, #fafafa 0% 50%) 0 0 / 24px 24px;
        overflow: hidden;
      }
      #ocb-preview-root {
        position: absolute;
        inset: 0;
      }
      .preview-page-hint {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font: 12px system-ui, sans-serif;
        color: #9a9aa2;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="preview-page-hint">Your website content would appear here</div>
    <div id="ocb-preview-root"></div>
    <script type="module" src="/src/preview/previewEntry.ts"></script>
  </body>
</html>
